# render.yaml — Render Blueprint for Aryan0854/candidate-shortlist
# Deploy all backend services in one click from GitHub.
#
# Steps:
# 1. Push this file to GitHub (already done).
# 2. Go to https://dashboard.render.com/select-repo?type=blueprint
# 3. Select the `Aryan0854/candidate-shortlist` repository.
# 4. Render will detect this file and create all services automatically.
# 5. Fill in the secret environment variables in the Render dashboard.

services:

  # ─── Candidate Shortlist Python FastAPI (port 8000) ──────────────────────
  - name: pmo-candidate-shortlist
    type: web
    runtime: docker
    dockerfilePath: ./candidate-shortlist/Dockerfile
    dockerContext: ./candidate-shortlist
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.xypizdyvhdjwbsvecrif:$(DB_PASSWORD)@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres
      - key: DB_PASSWORD
        sync: false   # Set your database password secret in Render dashboard

  # ─── Resume Screening Python FastAPI (port 8001) ─────────────────────────
  - name: pmo-resume-screening
    type: web
    runtime: docker
    dockerfilePath: ./resume-screening/Dockerfile
    dockerContext: ./resume-screening
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Set your Gemini API key secret in Render dashboard

